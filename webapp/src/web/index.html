<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音频工作台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>
:root{
  /* Anthropic / Claude warm editorial palette (verified from claude.com) */
  --canvas:#faf9f5;
  --surface:#ffffff;
  --card:#f4efe6;
  --card-2:#efe9de;
  --card-strong:#e8e0d2;
  --rail:#f1ece2;
  --border:#e7e0d5;
  --border-strong:#d8cfc0;
  --ink:#141413;
  --body:#3d3d3a;
  --muted:#6c6a64;
  --muted-soft:#8e8b82;
  --accent:#cc785c;
  --accent-deep:#c96442;
  --accent-hover:#b85b3c;
  --accent-soft:rgba(204,120,92,0.10);
  --accent-line:rgba(204,120,92,0.32);
  --success:#3c8a4e;
  --warning:#c2802a;
  --danger:#bd4b3b;
  --danger-soft:rgba(189,75,59,0.12);
  --serif:"Newsreader",ui-serif,Georgia,"Times New Roman",serif;
  --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --radius:12px;
  --radius-sm:9px;
  --radius-lg:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--sans);background:var(--canvas);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-size:14px}
button{font-family:inherit}
::selection{background:var(--accent-soft)}

.app{display:grid;grid-template-columns:230px minmax(0,1fr) 360px;height:100vh;overflow:hidden}

/* ============ LEFT · APP RAIL ============ */
.rail{background:var(--rail);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 14px;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 22px}
.brand .mark{width:30px;height:30px;border-radius:8px;flex-shrink:0;background:var(--ink);display:flex;align-items:center;justify-content:center}
.brand .mark svg{width:17px;height:17px;color:var(--canvas)}
.brand .name{font-family:var(--serif);font-size:18px;font-weight:500;letter-spacing:-0.01em;color:var(--ink);line-height:1.1}
.brand .sub{font-size:11px;color:var(--muted-soft);letter-spacing:.02em}

.rail-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-soft);padding:6px 10px 8px}
.apps{display:flex;flex-direction:column;gap:3px}
.app-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--body);border:1px solid transparent;transition:background .15s,color .15s;width:100%;text-align:left;background:none}
.app-item:hover{background:rgba(20,20,19,0.045)}
.app-item.active{background:var(--accent-soft);color:var(--accent-deep);border-color:var(--accent-line)}
.app-item.active .app-ico{color:var(--accent-deep)}
.app-item[disabled]{opacity:.5;cursor:not-allowed}
.app-item[disabled]:hover{background:none}
.app-ico{width:18px;height:18px;color:var(--muted);flex-shrink:0}
.app-item.active .app-ico{color:var(--accent-deep)}
.app-text{display:flex;flex-direction:column;min-width:0}
.app-text .t{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-text .d{font-size:10.5px;color:var(--muted-soft)}
.soon{margin-left:auto;font-size:9px;font-weight:600;letter-spacing:.04em;color:var(--muted-soft);border:1px solid var(--border-strong);border-radius:5px;padding:2px 5px}
.rail-foot{margin-top:auto;padding:14px 10px 4px;font-size:11px;color:var(--muted-soft);border-top:1px solid var(--border);line-height:1.6}
.rail-foot b{color:var(--muted);font-weight:600}

/* ============ MIDDLE · INPUT ============ */
.center{display:flex;flex-direction:column;overflow:hidden;background:var(--canvas)}
.center-head{padding:26px 36px 18px;border-bottom:1px solid var(--border)}
.center-head h1{font-family:var(--serif);font-size:27px;font-weight:500;letter-spacing:-0.02em;color:var(--ink)}
.center-head p{color:var(--muted);font-size:13.5px;margin-top:5px;max-width:560px}
.center-body{flex:1;overflow-y:auto;padding:26px 36px 56px}
.col{max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:20px}

.section-title{font-size:12px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:8px}
.section-title .req{color:var(--accent-deep)}

.dropzone{border:1.5px dashed var(--border-strong);border-radius:var(--radius);background:var(--card);padding:42px 24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:#f6efe6}
.dropzone .di{width:38px;height:38px;color:var(--muted);margin:0 auto 14px;display:block}
.dropzone:hover .di,.dropzone.drag .di{color:var(--accent)}
.dropzone .p{font-size:14px;color:var(--body)}
.dropzone .p b{color:var(--accent-deep);font-weight:600}
.dropzone .h{font-size:12px;color:var(--muted-soft);margin-top:6px}

.filecard{display:flex;align-items:center;gap:13px;padding:13px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.filecard .ic{width:38px;height:38px;border-radius:9px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent-deep)}
.filecard .meta{min-width:0;flex:1}
.filecard .nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.filecard .sz{font-size:12px;color:var(--muted)}
.filecard .x{border:none;background:none;color:var(--muted-soft);cursor:pointer;padding:6px;border-radius:7px;display:flex}
.filecard .x:hover{background:rgba(20,20,19,0.06);color:var(--ink)}
audio{width:100%;height:36px;margin-top:12px}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card .chead{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card .cnote{font-size:12px;color:var(--muted);margin-top:2px}
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.field>label{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:500;color:var(--ink);margin-bottom:8px}
.field>label .val{font-size:12px;color:var(--accent-deep);font-weight:600;font-variant-numeric:tabular-nums}

.select{position:relative}
.select select,.txt{width:100%;appearance:none;-webkit-appearance:none;background:var(--card);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:10px 13px;font-size:13.5px;color:var(--ink);font-family:inherit}
.select select{padding-right:38px;cursor:pointer}
.select select:focus,.txt:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.select .chev{position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}

input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:4px;background:var(--card-strong);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent-deep);cursor:pointer;border:2px solid var(--canvas);box-shadow:0 1px 3px rgba(20,20,19,.2)}

.switch{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.switch .track{width:38px;height:22px;border-radius:11px;background:var(--card-strong);position:relative;transition:.2s;flex-shrink:0}
.switch .track::after{content:'';position:absolute;left:2px;top:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(20,20,19,.2)}
.switch.on .track{background:var(--accent-deep)}
.switch.on .track::after{transform:translateX(16px)}

.adv{margin-top:6px;border-top:1px solid var(--border);padding-top:12px}
.adv-toggle{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;cursor:pointer;color:var(--muted);font-size:12.5px;font-weight:600;padding:4px 0}
.adv-toggle:hover{color:var(--ink)}
.adv-toggle .caret{transition:transform .2s;flex-shrink:0}
.adv.open .adv-toggle .caret{transform:rotate(90deg)}
.adv-count{font-size:10px;font-weight:600;color:var(--muted-soft);background:var(--card-strong);border-radius:5px;padding:1px 6px}
.adv-body{display:none;margin-top:14px}
.adv.open .adv-body{display:block}

/* Claude-style buttons */
.btn{width:100%;background:var(--accent-deep);color:#fff;border:none;padding:13px;border-radius:var(--radius-sm);font-size:14.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .18s,transform .05s}
.btn:hover{background:var(--accent-hover)}
.btn:active{transform:translateY(1px)}
.btn:disabled{background:var(--card-strong);color:var(--muted-soft);cursor:not-allowed}
.btn svg{width:18px;height:18px}

.alert{padding:12px 15px;border-radius:var(--radius-sm);font-size:13px;display:flex;gap:9px;align-items:flex-start}
.alert.err{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(189,75,59,.22)}
.alert svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}

.result{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.result .rhead{padding:16px 20px;border-bottom:1px solid var(--border)}
.result .rhead .rt{font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ink)}
.result .rbody{padding:20px}
.ab{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.ab{grid-template-columns:1fr}}
.lane .lbl{font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.lane.out .lbl{color:var(--accent-deep)}
.wave{height:54px;background:var(--card);border-radius:9px;border:1px solid var(--border);overflow:hidden}
.wave canvas{width:100%;height:100%;display:block}
.roll{height:170px;background:#171614;border-radius:11px;border:1px solid var(--border);overflow:hidden}
.roll canvas{width:100%;height:100%;display:block}
.metarow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;align-items:center}
.chip{font-size:12px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 11px}
.chip b{color:var(--ink);font-weight:600}
.dl{font-size:12.5px;color:var(--accent-deep);text-decoration:none;font-weight:600;border:1px solid var(--accent-line);border-radius:7px;padding:6px 12px;background:var(--accent-soft)}
.dl:hover{background:rgba(204,120,92,.16)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:70px 24px;color:var(--muted-soft)}
.empty .eic{width:58px;height:58px;border-radius:16px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:18px;color:var(--muted-soft)}
.empty .et{font-family:var(--serif);font-size:19px;color:var(--muted);font-weight:500}
.empty .ed{font-size:13px;margin-top:6px;max-width:320px}

/* ============ RIGHT · ASSETS ============ */
.assets{background:var(--rail);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.assets-head{padding:20px 18px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.assets-head .ti{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-size:17px;font-weight:500;color:var(--ink)}
.assets-head .ti svg{width:18px;height:18px;color:var(--accent-deep)}
.assets-head .tools{margin-left:auto;display:flex;gap:4px}
.iconbtn{border:none;background:none;color:var(--muted);width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn:hover{background:rgba(20,20,19,0.06);color:var(--ink)}
.iconbtn svg{width:16px;height:16px}
.iconbtn.spin svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.asset-list{flex:1;overflow-y:auto;padding:12px}
.asset{display:flex;gap:12px;padding:11px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:.15s;margin-bottom:6px}
.asset:hover{background:rgba(20,20,19,0.04)}
.asset.sel{background:var(--surface);border-color:var(--border);box-shadow:0 1px 2px rgba(20,20,19,.04)}
.thumb{width:62px;height:62px;border-radius:10px;flex-shrink:0;position:relative;overflow:hidden;background:#171614;display:flex;align-items:center;justify-content:center}
.thumb canvas{width:100%;height:100%}
.thumb .badge{position:absolute;left:5px;top:5px;z-index:2;display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;padding:3px 6px;border-radius:6px}
.badge.done{background:rgba(60,138,78,.92);color:#fff}
.badge.failed{background:rgba(189,75,59,.94);color:#fff}
.badge.run{background:rgba(194,128,42,.94);color:#fff}
.badge .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.badge.run .bdot{animation:pulse 1s ease-in-out infinite}
@keyframes pulse{50%{opacity:.35}}
.asset .info{min-width:0;flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px}
.asset .nm{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset .tag{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.asset .when{font-size:11px;color:var(--muted-soft)}
.asset .stat{font-size:11px;font-weight:600}
.stat.done{color:var(--success)}.stat.failed{color:var(--danger)}.stat.run{color:var(--warning)}
.assets-empty{padding:50px 24px;text-align:center;color:var(--muted-soft);font-size:13px}
.pager{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px}
.pager button{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--body);cursor:pointer;font-size:13px}
.pager button:hover:not(:disabled){border-color:var(--border-strong)}
.pager button.on{background:var(--accent-deep);color:#fff;border-color:var(--accent-deep)}
.pager button:disabled{opacity:.4;cursor:not-allowed}
.hidden{display:none !important}
</style>
</head>
<body>
<div class="app">

  <!-- LEFT · APP RAIL -->
  <aside class="rail">
    <div class="brand">
      <div class="mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h3l2.5-7 4 16 3-12 2 6h5.5"/></svg>
      </div>
      <div>
        <div class="name">音频工作台</div>
        <div class="sub">本地 · 端侧推理</div>
      </div>
    </div>
    <div class="rail-label">应用</div>
    <div class="apps" id="apps"></div>
    <div class="rail-foot"></div>
  </aside>

  <!-- MIDDLE · INPUT -->
  <main class="center">
    <div class="center-head">
      <h1 id="appTitle"></h1>
      <p id="appDesc"></p>
    </div>
    <div class="center-body">
      <div class="col">
        <div>
          <div class="section-title"><span class="req">*</span> 输入音频</div>
          <div class="dropzone" id="dropzone">
            <svg class="di" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <div class="p">点击选择，或将音频文件 <b>拖拽到此处</b></div>
            <div class="h">支持 WAV / MP3 / M4A / FLAC / OGG · 单声道与立体声均可</div>
          </div>
          <input type="file" id="fileInput" accept="audio/*,.wav,.mp3,.m4a,.flac,.ogg,.aac,.opus" hidden>
          <div class="filecard hidden" id="fileCard">
            <div class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
            <div class="meta"><div class="nm" id="fileName"></div><div class="sz" id="fileSize"></div></div>
            <button class="x" id="fileClear" title="移除"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
          </div>
          <audio id="inputPlayer" class="hidden" controls></audio>
        </div>

        <div class="card">
          <div class="chead">生成配置</div>
          <div class="field">
            <label>算法模型</label>
            <div class="select">
              <select id="modelSelect"></select>
              <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div id="paramFields"></div>
          <div class="cnote" id="appNote"></div>
        </div>

        <button class="btn" id="genBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span id="genLabel">开始处理</span>
        </button>

        <div class="alert err hidden" id="errBox">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="errText"></span>
        </div>

        <div id="previewWrap">
          <div class="result hidden" id="resultCard">
            <div class="rhead"><div class="rt" id="resultName"></div></div>
            <div class="rbody" id="resultBody"></div>
          </div>
          <div class="empty" id="emptyState">
            <div class="eic"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg></div>
            <div class="et">请先上传音频</div>
            <div class="ed">处理完成后，产物将在这里呈现。</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- RIGHT · ASSETS -->
  <aside class="assets">
    <div class="assets-head">
      <div class="ti">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        产物
      </div>
      <div class="tools">
        <button class="iconbtn" id="refreshBtn" title="刷新"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></button>
      </div>
    </div>
    <div class="asset-list" id="assetList"></div>
    <div class="pager" id="pager"></div>
  </aside>
</div>

<script>
const PER_PAGE = 7;
const state = { apps:[], app:null, file:null, model:null, params:{}, jobs:[], page:1, selected:null, total:0 };
const $ = s => document.querySelector(s);
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- apps ---------- */
async function loadApps(){
  const d = await (await fetch('/api/apps')).json();
  state.apps = d.apps;
  state.app = d.apps.find(a => a.enabled) || d.apps[0];
  renderApps(); applyApp();
}
function renderApps(){
  $('#apps').innerHTML = state.apps.map(a => `
    <button class="app-item ${a.id===state.app.id?'active':''}" data-id="${a.id}" ${a.enabled?'':'disabled'}>
      <span class="app-ico">${ICONS[a.icon]||ICONS.wave}</span>
      <span class="app-text"><span class="t">${esc(a.name)}</span></span>
    </button>`).join('');
  document.querySelectorAll('.app-item').forEach(el => el.addEventListener('click', () => {
    if(el.hasAttribute('disabled')) return;
    state.app = state.apps.find(a => a.id===el.dataset.id);
    state.selected = null;
    renderApps(); applyApp(); showEmpty();
  }));
}
function applyApp(){
  const a = state.app;
  $('#appTitle').textContent = a.name;
  $('#appDesc').textContent = a.desc;
  $('#genLabel').textContent = '启动';
  $('#modelSelect').innerHTML = a.models.map(m => `<option value="${m.id}">${esc(m.name)}</option>`).join('');
  state.model = a.models[0]?.id;
  $('#appNote').textContent = a.note || '';
  // init params from defaults
  state.params = {};
  state.advOpen = false;
  (a.params||[]).forEach(p => state.params[p.key] = p.default);
  renderParams();
}
function paramControl(p){
    const v = state.params[p.key];
    if(p.type==='select'){
      return `<div class="field"><label>${esc(p.label)}</label><div class="select">
        <select data-k="${p.key}">${p.options.map(o=>`<option value="${o.v}" ${o.v===v?'selected':''}>${esc(o.t)}</option>`).join('')}</select>
        <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div></div>`;
    }
    if(p.type==='text'){
      return `<div class="field"><label>${esc(p.label)}</label><input class="txt" type="text" data-k="${p.key}" value="${esc(String(v||''))}" placeholder="${esc(p.placeholder||'')}"></div>`;
    }
    if(p.type==='toggle'){
      return `<div class="field"><div class="switch ${v?'on':''}" data-k="${p.key}"><label style="margin:0;cursor:pointer">${esc(p.label)}</label><div class="track"></div></div></div>`;
    }
    // number
    return `<div class="field"><label>${esc(p.label)}<span class="val" data-val="${p.key}">${fmtNum(v,p.step)}</span></label>
      <input type="range" data-k="${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${v}"></div>`;
}
function bindParams(scope){
  scope.querySelectorAll('select[data-k]').forEach(el => el.addEventListener('change', e => state.params[e.target.dataset.k]=e.target.value));
  scope.querySelectorAll('input.txt[data-k]').forEach(el => el.addEventListener('input', e => state.params[e.target.dataset.k]=e.target.value));
  scope.querySelectorAll('input[type=range][data-k]').forEach(el => el.addEventListener('input', e => {
    const k=e.target.dataset.k; const val=parseFloat(e.target.value); state.params[k]=val;
    const lbl=scope.querySelector(`[data-val="${k}"]`); if(lbl) lbl.textContent=fmtNum(val,e.target.step);
  }));
  scope.querySelectorAll('.switch[data-k]').forEach(el => el.addEventListener('click', () => {
    const k=el.dataset.k; state.params[k]=!state.params[k]; el.classList.toggle('on',state.params[k]);
  }));
}
function renderParams(){
  const wrap = $('#paramFields');
  const all = state.app.params||[];
  const basic = all.filter(p => !p.advanced);
  const adv = all.filter(p => p.advanced);
  let html = basic.map(paramControl).join('');
  if(adv.length){
    html += `<div class="adv ${state.advOpen?'open':''}" id="advGroup">
      <button type="button" class="adv-toggle" id="advToggle">
        <svg class="caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        <span>高级参数</span><span class="adv-count">${adv.length}</span>
      </button>
      <div class="adv-body">${adv.map(paramControl).join('')}</div>
    </div>`;
  }
  wrap.innerHTML = html;
  const at = wrap.querySelector('#advToggle');
  if(at) at.addEventListener('click', () => {
    state.advOpen = !state.advOpen;
    wrap.querySelector('#advGroup').classList.toggle('open', state.advOpen);
  });
  bindParams(wrap);
}
const fmtNum=(v,step)=>{ const s=parseFloat(step); return (s<1)?(+v).toFixed(String(step).split('.')[1]?.length||2):String(+v); };

/* ---------- file ---------- */
function handleFile(f){
  if(!f) return;
  const ok=/^audio\//.test(f.type)||/\.(wav|mp3|m4a|flac|ogg|aac|opus|aif|aiff|webm)$/i.test(f.name);
  if(!ok){ showErr('请选择有效的音频文件。'); return; }
  state.file=f;
  $('#fileName').textContent=f.name; $('#fileSize').textContent=fmtSize(f.size);
  $('#fileCard').classList.remove('hidden'); $('#dropzone').classList.add('hidden');
  const ip=$('#inputPlayer'); ip.src=URL.createObjectURL(f); ip.classList.remove('hidden');
  $('#genBtn').disabled=false; hideErr();
}
function clearFile(){
  state.file=null; $('#fileCard').classList.add('hidden'); $('#dropzone').classList.remove('hidden');
  $('#inputPlayer').classList.add('hidden'); $('#inputPlayer').src=''; $('#fileInput').value=''; $('#genBtn').disabled=true;
}
const fmtSize=b=>b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';

/* ---------- generate ---------- */
async function generate(){
  if(!state.file) return;
  hideErr(); $('#genBtn').disabled=true;
  const m=state.app.models.find(x=>x.id===state.model);
  const fd=new FormData();
  fd.append('file',state.file);
  fd.append('app',state.app.id);
  fd.append('model',state.model);
  fd.append('model_name',m?m.name:state.model);
  fd.append('params',JSON.stringify(state.params));
  try{
    const r=await fetch('/api/jobs',{method:'POST',body:fd});
    if(!r.ok) throw new Error((await r.json()).error||'提交失败');
    const job=await r.json();
    state.page=1; state.selected=job.id;
    await loadJobs(); startPolling();
  }catch(e){ showErr(e.message); }
  finally{ $('#genBtn').disabled=!state.file; }
}

/* ---------- jobs ---------- */
async function loadJobs(){
  const d=await (await fetch(`/api/jobs?page=${state.page}&per_page=${PER_PAGE}`)).json();
  state.jobs=d.jobs; state.total=d.total;
  renderAssets(); renderPager();
  if(state.selected){
    const sel=state.jobs.find(j=>j.id===state.selected);
    if(sel&&sel.status==='done') showResult(sel);
    else if(sel&&sel.status==='failed') showErr(sel.error||'处理失败。');
  }
}
function statusMeta(s){
  return s==='done'?{cls:'done',label:'生成成功'}:s==='failed'?{cls:'failed',label:'生成失败'}
    :{cls:'run',label:s==='processing'?'处理中':'排队中'};
}
function renderAssets(){
  const list=$('#assetList');
  if(!state.jobs.length){ list.innerHTML=`<div class="assets-empty">还没有产物。<br>上传音频并开始处理吧。</div>`; return; }
  list.innerHTML=state.jobs.map(j=>{
    const m=statusMeta(j.status);
    return `<div class="asset ${j.id===state.selected?'sel':''}" data-id="${j.id}">
      <div class="thumb"><span class="badge ${m.cls}"><span class="bdot"></span>${m.label}</span>
        <canvas data-thumb="${j.id}" width="124" height="124"></canvas></div>
      <div class="info"><div class="nm">${esc(j.name)}</div>
        <div class="tag">${esc(j.model_name||j.model)}</div>
        <div class="stat ${m.cls}">${m.label}${j.product==='midi'&&j.note_count!=null?` · ${j.note_count} 音符`:''}</div>
        <div class="when">${fmtTime(j.created_at)}</div></div></div>`;
  }).join('');
  document.querySelectorAll('.asset').forEach(el=>el.addEventListener('click',()=>selectJob(el.dataset.id)));
  state.jobs.forEach(j=>{ if(j.status==='done') drawThumb(j); });
}
const fmtTime=ts=>{const d=new Date(ts*1000),p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;};
function renderPager(){
  const pages=Math.max(1,Math.ceil(state.total/PER_PAGE));
  if(pages<=1){ $('#pager').innerHTML=''; return; }
  let h=`<button ${state.page<=1?'disabled':''} data-p="${state.page-1}">‹</button>`;
  for(let i=1;i<=pages;i++) h+=`<button class="${i===state.page?'on':''}" data-p="${i}">${i}</button>`;
  h+=`<button ${state.page>=pages?'disabled':''} data-p="${state.page+1}">›</button>`;
  $('#pager').innerHTML=h;
  document.querySelectorAll('.pager button').forEach(b=>b.addEventListener('click',()=>{ if(!b.disabled){state.page=+b.dataset.p;loadJobs();} }));
}
function selectJob(id){
  state.selected=id; const j=state.jobs.find(x=>x.id===id); renderAssets();
  if(j&&j.status==='done') showResult(j);
  else if(j&&j.status==='failed') { showEmpty(); showErr(j.error||'处理失败。'); }
  else showEmpty();
}
function showEmpty(){ $('#resultCard').classList.add('hidden'); $('#emptyState').classList.remove('hidden'); }

/* ---------- result preview ---------- */
function showResult(j){

  $('#emptyState').classList.add('hidden'); $('#resultCard').classList.remove('hidden');
  $('#resultName').textContent=j.name;
  const body=$('#resultBody');

    body.innerHTML=`
      <div class="lane out"><div class="lbl">音符卷帘 Piano Roll</div><div class="roll"><canvas id="rollCv"></canvas></div></div>
      <div class="lane" style="margin-top:16px"><div class="lbl">原始音频</div><div class="wave"><canvas id="waveIn"></canvas></div><audio id="origPlayer" controls></audio></div>
      <div class="metarow">
        ${j.note_count!=null?`<div class="chip">音符 <b>${j.note_count}</b></div>`:''}
        ${j.duration!=null?`<div class="chip">耗时 <b>${j.duration.toFixed(2)}s</b></div>`:''}
        <div class="chip">模型 <b>${esc(j.model_name||j.model)}</b></div>
        <a class="dl" href="/api/jobs/${j.id}/file?kind=midi" download>下载 MIDI ↓</a>
        <a class="dl" href="/api/jobs/${j.id}/file?kind=json" download>下载 JSON ↓</a>
      </div>`;
    $('#origPlayer').src=`/api/jobs/${j.id}/audio?which=input`;

      <div class="lane"><div class="lbl">原始</div><div class="wave"><canvas id="waveIn"></canvas></div><audio id="origPlayer" controls></audio></div>
      <div class="ab" style="margin-top:16px">
        <div class="lane out"><div class="lbl">Vocal</div><div class="wave"><canvas id="waveVocal"></canvas></div><audio id="vocalPlayer" controls></audio></div>
        <div class="lane out"><div class="lbl">Instrumental</div><div class="wave"><canvas id="waveInstrumental"></canvas></div><audio id="instrumentalPlayer" controls></audio></div>
      </div>
      <div class="metarow">
        ${j.duration!=null?`<div class="chip">耗时 <b>${j.duration.toFixed(2)}s</b></div>`:''}
        ${j.rtf!=null?`<div class="chip">RTF <b>${j.rtf.toFixed(3)}</b></div>`:''}
        <div class="chip">模型 <b>${esc(j.model_name||j.model)}</b></div>
        <a class="dl" href="/api/jobs/${j.id}/audio?which=vocal&download=1" download>下载 Vocal ↓</a>
        <a class="dl" href="/api/jobs/${j.id}/audio?which=instrumental&download=1" download>下载 Instrumental ↓</a>
      </div>`;
    $('#origPlayer').src=`/api/jobs/${j.id}/audio?which=input`;
    $('#vocalPlayer').src=`/api/jobs/${j.id}/audio?which=vocal`;
    $('#instrumentalPlayer').src=`/api/jobs/${j.id}/audio?which=instrumental`;
    drawWaveFromUrl(`/api/jobs/${j.id}/audio?which=input`,$('#waveIn'),'#8e8b82');
    drawWaveFromUrl(`/api/jobs/${j.id}/audio?which=vocal`,$('#waveVocal'),'#cc785c');

  }else{
    body.innerHTML=`
      <div class="ab">

      </div>
      <div class="metarow">
        ${j.duration!=null?`<div class="chip">耗时 <b>${j.duration.toFixed(2)}s</b></div>`:''}
        ${j.rtf!=null?`<div class="chip">RTF <b>${j.rtf.toFixed(3)}</b></div>`:''}
        <div class="chip">模型 <b>${esc(j.model_name||j.model)}</b></div>
        <a class="dl" href="/api/jobs/${j.id}/audio?which=output&download=1" download>下载结果 ↓</a>
      </div>`;
    $('#origPlayer').src=`/api/jobs/${j.id}/audio?which=input`;
    $('#resPlayer').src=`/api/jobs/${j.id}/audio?which=output`;
    drawWaveFromUrl(`/api/jobs/${j.id}/audio?which=input`,$('#waveIn'),'#8e8b82');
    drawWaveFromUrl(`/api/jobs/${j.id}/audio?which=output`,$('#waveOut'),'#cc785c');
  }
}

/* ---------- waveform (Web Audio) ---------- */
const actx=new (window.AudioContext||window.webkitAudioContext)();
const waveCache={};
async function decodePeaks(url,buckets){
  const key=url+buckets; if(waveCache[key]) return waveCache[key];
  const buf=await (await fetch(url)).arrayBuffer();
  const audio=await actx.decodeAudioData(buf.slice(0));
  const ch=audio.getChannelData(0); const step=Math.floor(ch.length/buckets)||1; const peaks=[];
  for(let i=0;i<buckets;i++){ let mx=0; for(let j=0;j<step;j++){ const v=Math.abs(ch[i*step+j]||0); if(v>mx)mx=v;} peaks.push(mx); }
  const norm=Math.max(...peaks)||1; const out=peaks.map(p=>p/norm); waveCache[key]=out; return out;
}
function paint(canvas,peaks,color){
  const dpr=window.devicePixelRatio||1, w=canvas.clientWidth||canvas.width, h=canvas.clientHeight||canvas.height;
  canvas.width=w*dpr; canvas.height=h*dpr; const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,h);
  const bw=w/peaks.length; ctx.fillStyle=color;
  peaks.forEach((p,i)=>{ const bh=Math.max(2,p*h*0.86); ctx.fillRect(i*bw+bw*0.18,(h-bh)/2,Math.max(1,bw*0.64),bh); });
}
async function drawWaveFromUrl(url,canvas,color){ try{ paint(canvas,await decodePeaks(url,90),color);}catch(e){} }

/* ---------- piano roll ---------- */
const notesCache={};
async function fetchNotes(id){
  if(notesCache[id]) return notesCache[id];
  const d=await (await fetch(`/api/jobs/${id}/file?kind=notes`)).json(); notesCache[id]=d; return d;
}
async function drawPianoRoll(j,canvas){
  try{
    const d=await fetchNotes(j.id); const notes=d.notes||[];
    const dpr=window.devicePixelRatio||1, w=canvas.clientWidth||canvas.width, h=canvas.clientHeight||canvas.height;
    canvas.width=w*dpr; canvas.height=h*dpr; const ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,h);
    if(!notes.length) return;
    const span=d.span||Math.max(...notes.map(n=>n.offset))||1;
    let lo=Math.min(...notes.map(n=>n.pitch)), hi=Math.max(...notes.map(n=>n.pitch));
    if(hi-lo<6){ const c=(hi+lo)/2; lo=c-3; hi=c+3; }
    const pad=6, gw=w-pad*2, gh=h-pad*2;
    // gridlines
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
    for(let i=0;i<=4;i++){ const y=pad+gh*i/4; ctx.beginPath(); ctx.moveTo(pad,y); ctx.lineTo(w-pad,y); ctx.stroke(); }
    notes.forEach(n=>{
      const x=pad+(n.onset/span)*gw, ww=Math.max(2,((n.offset-n.onset)/span)*gw);
      const y=pad+(1-(n.pitch-lo)/(hi-lo||1))*gh;
      ctx.fillStyle='#cc785c'; ctx.beginPath();
      const rh=Math.max(3,gh/(hi-lo+2));
      roundRect(ctx,x,y-rh/2,ww,rh,2); ctx.fill();
    });
  }catch(e){}
}
function roundRect(ctx,x,y,w,h,r){ r=Math.min(r,h/2,w/2); ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

async function drawThumb(j){
  const c=document.querySelector(`canvas[data-thumb="${j.id}"]`); if(!c) return;
  if(j.product==='midi'){ drawPianoRoll(j,c); }
  else{
    const firstAudio=(j.artifacts||[]).find(a=>a.kind==='audio');
    const key=firstAudio?firstAudio.key:'output';
    try{ paint(c,await decodePeaks(`/api/jobs/${j.id}/audio?which=${encodeURIComponent(key)}`,40),'#cc785c'); }catch(e){}
  }
}

/* ---------- polling ---------- */
let pollTimer=null;
function startPolling(){
  if(pollTimer) return;
  pollTimer=setInterval(async()=>{ await loadJobs();
    if(!state.jobs.some(j=>j.status==='queued'||j.status==='processing')){ clearInterval(pollTimer); pollTimer=null; }
  },1800);
}

function showErr(m){ $('#errText').textContent=m; $('#errBox').classList.remove('hidden'); }
function hideErr(){ $('#errBox').classList.add('hidden'); }

const ICONS={
  wave:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12h2l3-8 4 16 3-12 2 6h6"/></svg>',
  sparkle:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.6L19.5 10l-5.6 1.4L12 17l-1.9-5.6L4.5 10l5.6-1.4L12 3z"/></svg>',
  notes:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
  denoise:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h3l2-5 3 14 2-9 1.5 4H21"/></svg>',
  split:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88M14.47 14.48 20 20"/></svg>'
};

$('#dropzone').addEventListener('click',()=>$('#fileInput').click());
$('#dropzone').addEventListener('dragover',e=>{e.preventDefault();$('#dropzone').classList.add('drag');});
$('#dropzone').addEventListener('dragleave',()=>$('#dropzone').classList.remove('drag'));
$('#dropzone').addEventListener('drop',e=>{e.preventDefault();$('#dropzone').classList.remove('drag');handleFile(e.dataTransfer.files[0]);});
$('#fileInput').addEventListener('change',e=>handleFile(e.target.files[0]));
$('#fileClear').addEventListener('click',clearFile);
$('#modelSelect').addEventListener('change',e=>state.model=e.target.value);
$('#genBtn').addEventListener('click',generate);
$('#refreshBtn').addEventListener('click',async()=>{const b=$('#refreshBtn');b.classList.add('spin');await loadJobs();setTimeout(()=>b.classList.remove('spin'),500);});

(async function init(){ await loadApps(); await loadJobs(); if(state.jobs.some(j=>j.status==='queued'||j.status==='processing')) startPolling(); })();
</script>
